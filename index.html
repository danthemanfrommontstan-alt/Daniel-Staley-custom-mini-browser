<!DOCTYPE html>
<html>
<head>
  <title>Daniel's Mini-Browser</title>
  <style>
    body { margin: 0; font-family: Arial; text-align: center; }
    input { width: 50%; padding: 8px; }
    button { padding: 6px 10px; margin: 2px; }
    #tabs { margin: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
    .tab-btn { margin: 2px; }
    .active-tab { background-color: #4CAF50; color: white; }
    iframe { width: 100%; height: 600px; border: none; }
  </style>
</head>
<body>

<h2>Daniel's Mini-Browser</h2>

<input type="text" id="urlInput" placeholder="Enter website (example.com)">
<button onclick="loadSite(currentTab)">Go</button>
<button onclick="newMiniTab(document.getElementById('urlInput').value)">Open in New Mini-Tab</button>

<div id="tabs"></div>

<iframe id="browserFrame"></iframe>

<script>
let tabs = [];         
let currentTab = -1;   

// Create a new mini-browser tab
function newMiniTab(url) {
  if (!url) return;
  if (!url.startsWith("http")) url = "https://" + url;
  tabs.push(url);
  currentTab = tabs.length - 1;
  updateTabsDisplay();
  loadInIframe(url);
}

// Switch to an existing tab
function switchTab(index) {
  currentTab = index;
  loadInIframe(tabs[index]);
  updateTabsDisplay();
}

// Load site in current tab
function loadSite(tabIndex) {
  if (tabIndex < 0) return;
  let url = document.getElementById("urlInput").value;
  if (!url.startsWith("http")) url = "https://" + url;
  tabs[tabIndex] = url;
  loadInIframe(url);
  updateTabsDisplay();
}

// Update the tab buttons
function updateTabsDisplay() {
  let container = document.getElementById("tabs");
  container.innerHTML = "";
  tabs.forEach((url, i) => {
    let btn = document.createElement("button");
    btn.textContent = "Tab " + (i+1);
    btn.className = "tab-btn" + (i === currentTab ? " active-tab" : "");
    btn.onclick = () => switchTab(i);
    container.appendChild(btn);
  });
}

// Load URL in iframe and override links inside
function loadInIframe(url) {
  const iframe = document.getElementById("browserFrame");
  iframe.src = url;

  // Wait until iframe loads to inject link interception
  iframe.onload = () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      const links = doc.querySelectorAll('a');
      links.forEach(link => {
        link.onclick = function(e) {
          e.preventDefault(); // Stop it from opening in Chrome
          newMiniTab(link.href); // Open inside a new mini-browser tab
        }
      });
    } catch (err) {
      // Some websites block access to their content due to security policies (CORS)
      console.log("Cannot intercept links for this site:", url);
    }
  };

  // Update input box
  document.getElementById("urlInput").value = url;
}

// Load the first tab
window.onload = () => {
  newMiniTab("https://example.com");
};
</script>

</body>
</html>
