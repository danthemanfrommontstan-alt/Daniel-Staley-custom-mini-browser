<!DOCTYPE html>
<html>
<head>
  <title>My Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
    }

    #topbar {
      background: #2c2c2c;
      padding: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    #tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 5px;
      flex-wrap: wrap;
    }

    .tab {
      background: #444;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
    }

    .active {
      background: #4CAF50;
    }

    input {
      flex: 1;
      padding: 6px;
      border-radius: 4px;
      border: none;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 110px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>

<div id="topbar">

  <div id="tabs"></div>

  <input type="text" id="urlInput" placeholder="Enter URL">
  <button onclick="go()">Go</button>
  <button onclick="newTab()">New Tab</button>
  <button onclick="closeTab()">Close Tab</button>
  <button onclick="goFullscreen()">Fullscreen</button>

</div>

<iframe id="browserFrame"></iframe>

<script>
const workerURL = "https://orange-frog-5257.danthemanfrommontstan.workers.dev/"; //

let tabs = [];
let currentTab = -1;

function formatURL(url) {
  if (!url.startsWith("http")) {
    return "https://" + url;
  }
  return url;
}

function newTab(url = "https://example.com") {
  tabs.push(formatURL(url));
  currentTab = tabs.length - 1;
  renderTabs();
  loadCurrentTab();
}

function closeTab() {
  if (currentTab === -1) return;
  tabs.splice(currentTab, 1);
  if (tabs.length === 0) {
    currentTab = -1;
    document.getElementById("browserFrame").src = "";
  } else {
    currentTab = Math.max(0, currentTab - 1);
    loadCurrentTab();
  }
  renderTabs();
}

function switchTab(index) {
  currentTab = index;
  loadCurrentTab();
  renderTabs();
}

function renderTabs() {
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";

  tabs.forEach((url, index) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (index === currentTab ? " active" : "");
    tab.textContent = "Tab " + (index + 1);
    tab.onclick = () => switchTab(index);
    tabsDiv.appendChild(tab);
  });
}

function go() {
  if (currentTab === -1) {
    newTab(document.getElementById("urlInput").value);
    return;
  }

  const url = formatURL(document.getElementById("urlInput").value);
  tabs[currentTab] = url;
  loadCurrentTab();
}

function loadCurrentTab() {
  if (currentTab === -1) return;

  const url = tabs[currentTab];
  document.getElementById("urlInput").value = url;

  const proxiedURL = workerURL + "/?url=" + encodeURIComponent(url);
  document.getElementById("browserFrame").src = proxiedURL;
}

function goFullscreen() {
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  }
}

window.onload = function() {
  newTab("https://example.com");
};
</script>

</body>
</html>
