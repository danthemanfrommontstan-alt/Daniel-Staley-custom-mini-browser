<!DOCTYPE html>
<html>
<head>
  <title>Daniel's Multi-Tab Browser</title>
  <style>
    body { margin: 0; font-family: Arial; text-align: center; }
    input { width: 60%; padding: 8px; }
    button { padding: 8px; margin: 2px; }
    #tabs { margin-bottom: 10px; }
    iframe { width: 100%; height: 600px; border: none; }
    .active-tab { background-color: #4CAF50; color: white; }
  </style>
</head>
<body>

<h2>Daniel's Multi-Tab Browser</h2>

<input type="text" id="urlInput" placeholder="Enter website (example.com)">
<button onclick="loadSite(currentTab)">Go</button>

<div id="tabs">
  <button onclick="switchTab(0)" class="active-tab">Tab 1</button>
  <button onclick="switchTab(1)">Tab 2</button>
  <button onclick="switchTab(2)">Tab 3</button>
</div>

<iframe id="browserFrame"></iframe>

<script>
  // Array to store URLs for each tab
  let tabs = ["https://example.com", "https://example.com", "https://example.com"];
  let currentTab = 0;

  function loadSite(tabIndex) {
    let url = document.getElementById("urlInput").value;
    if (!url.startsWith("http")) {
      url = "https://" + url;
    }
    tabs[tabIndex] = url; // save the URL in the tab
    document.getElementById("browserFrame").src = url;
  }

  function switchTab(tabIndex) {
    currentTab = tabIndex;
    document.getElementById("browserFrame").src = tabs[tabIndex];
    
    // Update active tab button style
    let buttons = document.querySelectorAll("#tabs button");
    buttons.forEach((btn, i) => {
      btn.classList.toggle("active-tab", i === tabIndex);
    });

    // Update input box with current tab's URL
    document.getElementById("urlInput").value = tabs[tabIndex];
  }

  // Load first tab initially
  window.onload = () => {
    document.getElementById("browserFrame").src = tabs[0];
    document.getElementById("urlInput").value = tabs[0];
  }
</script>

</body>
</html>
