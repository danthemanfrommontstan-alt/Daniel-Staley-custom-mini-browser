<!DOCTYPE html>
<html>
<head>
  <title>Daniel's Click-to-New-Tab Mini-Browser</title>
  <style>
    body { margin: 0; font-family: Arial; text-align: center; }
    input { width: 50%; padding: 8px; margin: 4px 0; }
    button { padding: 6px 10px; margin: 2px; }
    #tabs { margin: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
    .tab-btn { margin: 2px; }
    .active-tab { background-color: #4CAF50; color: white; }
    iframe { width: 100%; height: 600px; border: none; }
  </style>
</head>
<body>

<h2>Daniel's Click-to-New-Tab Mini-Browser</h2>

<input type="text" id="urlInput" placeholder="Enter website (example.com)">
<button onclick="newMiniTab(document.getElementById('urlInput').value)">Open in New Tab</button>

<div id="tabs"></div>

<iframe id="browserFrame"></iframe>

<script>
let tabs = [];
let currentTab = -1;

// Function to create a new tab
function newMiniTab(url) {
  if (!url) return;
  if (!url.startsWith("http")) url = "https://" + url;
  tabs.push(url);
  currentTab = tabs.length - 1;
  updateTabsDisplay();
  loadInIframe(url);
}

// Function to switch tabs
function switchTab(index) {
  currentTab = index;
  loadInIframe(tabs[index]);
  updateTabsDisplay();
}

// Update tab buttons
function updateTabsDisplay() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  tabs.forEach((url, i) => {
    const btn = document.createElement("button");
    btn.textContent = "Tab " + (i + 1);
    btn.className = "tab-btn" + (i === currentTab ? " active-tab" : "");
    btn.onclick = () => switchTab(i);
    container.appendChild(btn);
  });
}

// Load a URL in the iframe and intercept links
function loadInIframe(url) {
  const iframe = document.getElementById("browserFrame");
  iframe.src = url;
  document.getElementById("urlInput").value = url;

  iframe.onload = () => {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      // Intercept all links inside iframe
      const links = doc.querySelectorAll('a');
      links.forEach(link => {
        link.onclick = function(e) {
          e.preventDefault(); // stop default Chrome tab opening
          newMiniTab(link.href); // open in a new mini-browser tab
        };
      });
    } catch(err) {
      console.log("Cannot intercept links for this site:", url);
    }
  };
}

// Start with a first tab
window.onload = () => {
  newMiniTab("https://example.com");
};
</script>

</body>
</html>
