<!DOCTYPE html>
<html>
<head>
  <title>Daniel's Mini-Browser</title>
  <style>
    body { margin: 0; font-family: Arial; text-align: center; }
    input { width: 50%; padding: 8px; margin: 4px 0; }
    button { padding: 6px 10px; margin: 2px; }
    #tabs { margin: 10px; display: flex; flex-wrap: wrap; justify-content: center; }
    .tab-btn { margin: 2px; }
    .active-tab { background-color: #4CAF50; color: white; }
    #presetLinks { margin: 10px; }
    iframe { width: 100%; height: 600px; border: none; }
  </style>
</head>
<body>

<h2>Daniel's Free Mini-Browser</h2>

<input type="text" id="urlInput" placeholder="Enter website (example.com)">
<button onclick="loadSite(currentTab)">Go</button>
<button onclick="newMiniTab(document.getElementById('urlInput').value)">Open in New Tab</button>

<div id="tabs"></div>

<div id="presetLinks">
  <h3>Quick Links</h3>
  <button onclick="newMiniTab('https://example.com')">Example</button>
  <button onclick="newMiniTab('https://w3schools.com')">W3Schools</button>
  <button onclick="newMiniTab('https://github.com')">GitHub</button>
</div>

<iframe id="browserFrame"></iframe>

<script>
let tabs = [];         
let currentTab = -1;   

function newMiniTab(url) {
  if (!url) return;
  if (!url.startsWith("http")) url = "https://" + url;
  tabs.push(url);
  currentTab = tabs.length - 1;
  updateTabsDisplay();
  loadInIframe(url);
}

function switchTab(index) {
  currentTab = index;
  loadInIframe(tabs[index]);
  updateTabsDisplay();
}

function loadSite(tabIndex) {
  if (tabIndex < 0) return;
  let url = document.getElementById("urlInput").value;
  if (!url.startsWith("http")) url = "https://" + url;
  tabs[tabIndex] = url;
  loadInIframe(url);
  updateTabsDisplay();
}

function updateTabsDisplay() {
  let container = document.getElementById("tabs");
  container.innerHTML = "";
  tabs.forEach((url, i) => {
    let btn = document.createElement("button");
    btn.textContent = "Tab " + (i+1);
    btn.className = "tab-btn" + (i === currentTab ? " active-tab" : "");
    btn.onclick = () => switchTab(i);
    container.appendChild(btn);
  });
}

function loadInIframe(url) {
  document.getElementById("browserFrame").src = url;
  document.getElementById("urlInput").value = url;
}

// Load first tab automatically
window.onload = () => {
  newMiniTab("https://example.com");
};
</script>

</body>
</html>
