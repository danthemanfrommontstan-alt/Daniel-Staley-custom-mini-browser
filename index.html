<!DOCTYPE html>
<html>
<head>
  <title>My Browser</title>
</head>
<body>

  <input type="text" id="urlInput" placeholder="Enter website URL" style="width:70%;">
  <button onclick="go()">Go</button>

  <br><br>

  <iframe id="browserFrame" style="width:100%; height:80vh;"></iframe>

  <script>
    function go() {
      let url = document.getElementById("urlInput").value;

      if (!url.startsWith("http")) {
        url = "https://" + url;
      }

const proxy = "https://orange-frog-5257.danthemanfrommontstan.workers.dev/";
      const finalURL = proxy + "/?url=" + encodeURIComponent(url);

      document.getElementById("browserFrame").src = finalURL;
    }
  </script>

</body>
</html>
